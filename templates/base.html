{% load static %}
<!doctype html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}fair-web{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-0:#020617; --bg-1:#07111f; --bg-2:#0f172a; --bg-3:#101826;
            --txt:#f8fafc; --txt-muted:#cbd5e1; --txt-dim:#94a3b8;
            --accent:#7dd3fc; --accent-2:#93c5fd; --ok:#86efac; --danger:#f87171;
            --border:#1e293b;
        }
        [data-bs-theme="dark"] {
            --bs-body-bg: var(--bg-1);
            --bs-body-color: var(--txt-muted);
            --bs-emphasis-color: var(--txt);
            --bs-border-color: var(--border);
            --bs-link-color: var(--accent);
            --bs-link-hover-color: var(--accent-2);
        }
        body {
            font-family: Bahnschrift, "Segoe UI", sans-serif;
            background:
                radial-gradient(1100px 520px at 82% -12%, #0b1b30 0%, transparent 60%),
                var(--bg-1);
            color: var(--txt-muted);
        }
        h1,h2,h3,h4,h5 { color: var(--txt); letter-spacing:.2px; }
        a { color: var(--accent); }
        .navbar { background: var(--bg-2) !important; border-bottom:1px solid var(--border) !important; }
        .navbar-brand { font-weight:600; letter-spacing:.4px; color: var(--txt); }
        .card {
            background: var(--bg-2);
            border:1px solid var(--border);
            border-radius:1rem;
            box-shadow:0 18px 60px rgba(2,6,23,.45);
        }
        .btn { border-radius:999px; font-weight:500; }
        .btn-primary {
            --bs-btn-bg: var(--accent); --bs-btn-border-color: var(--accent);
            --bs-btn-hover-bg: var(--accent-2); --bs-btn-hover-border-color: var(--accent-2);
            --bs-btn-active-bg: var(--accent-2); --bs-btn-active-border-color: var(--accent-2);
            --bs-btn-color:#04223a; --bs-btn-hover-color:#04223a; --bs-btn-active-color:#04223a;
        }
        .btn-outline-secondary {
            --bs-btn-color: var(--txt-muted); --bs-btn-border-color: var(--border);
            --bs-btn-hover-bg: var(--bg-3); --bs-btn-hover-border-color: var(--accent); --bs-btn-hover-color: var(--txt);
        }
        .btn-outline-danger { --bs-btn-color: var(--danger); --bs-btn-border-color:#7f1d1d; --bs-btn-hover-bg:#7f1d1d; --bs-btn-hover-border-color:#7f1d1d; }
        .table { --bs-table-bg: transparent; --bs-table-color: var(--txt-muted); --bs-table-border-color: var(--border); }
        .table thead th { color: var(--txt-dim); text-transform:uppercase; font-size:.78rem; letter-spacing:.06em; }
        .form-control, .form-select {
            background: var(--bg-3); border:1px solid var(--border); color: var(--txt); border-radius:.65rem;
        }
        .form-control:focus, .form-select:focus {
            background: var(--bg-3); border-color: var(--accent); color: var(--txt);
            box-shadow:0 0 0 .2rem rgba(125,211,252,.2);
        }
        .form-label { color: var(--txt-dim); font-size:.85rem; }
        .badge.text-bg-light { background: var(--bg-3) !important; color: var(--accent) !important; border:1px solid var(--border); }
        .breadcrumb { --bs-breadcrumb-divider-color: var(--txt-dim); }
        .breadcrumb-item.active { color: var(--txt-dim); }
        footer.bg-body-tertiary { background: var(--bg-2) !important; border-top:1px solid var(--border) !important; }
        .lead { color: var(--txt-muted); }
        .svg-edge { stroke: var(--border); stroke-width: 1.5; }
        .svg-node rect { fill: var(--bg-3); stroke: var(--border); stroke-width: 1.5; transition: fill .15s, stroke .15s; }
        .svg-node text { fill: var(--txt-dim); font-size: 12px; font-family: Bahnschrift, "Segoe UI", sans-serif; pointer-events: none; }
        .svg-node.aktiv rect { fill: var(--accent); stroke: var(--accent); }
        .svg-node.aktiv text { fill: #04223a; font-weight: 700; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{% url 'szenarien:dashboard' %}">fair-web</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'szenarien:dashboard' %}">Szenarien</a></li>
            </ul>
            <a class="btn btn-primary btn-sm" href="{% url 'szenarien:create' %}">+ Neues Szenario</a>
        </div>
    </div>
</nav>

<main class="container py-4 flex-grow-1">
    {% block content %}{% endblock %}
</main>

<footer class="bg-body-tertiary border-top py-3 mt-auto">
    <div class="container small text-body-secondary">
        fair-web &middot; FAIR Monte Carlo mit PyFair
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
