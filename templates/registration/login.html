{% extends "base.html" %}

{% block title %}Anmelden &middot; fair-web{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <h1 class="h3 mb-3">Anmelden</h1>
        {% if form.errors %}
        <div class="alert alert-danger">Benutzername oder Passwort ist falsch.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="{{ form.username.id_for_label }}">Benutzername</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label" for="{{ form.password.id_for_label }}">Passwort</label>
                {{ form.password }}
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button class="btn btn-primary w-100" type="submit">Anmelden</button>
        </form>
        <p class="text-body-secondary small mt-3 mb-0">
            Noch kein Konto? <a href="{% url 'konten:registrieren' %}">Registrieren</a>
        </p>
    </div>
</div>
{% endblock %}
