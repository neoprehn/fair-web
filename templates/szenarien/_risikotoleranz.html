{# Kontextbasierte Risikotoleranz: Konstant / Kurve / Verteilung. #}
<div class="card card-config h-100"><div class="card-body py-2">
    <label class="form-label">Risikotoleranz</label>
    <select name="rt_type" id="rt-type" class="form-select form-select-sm mb-2">
        <option value="">– keine –</option>
        <option value="constant">Konstant (Schwellenwert)</option>
        <option value="curve">Kurve (Punkte)</option>
        <option value="distribution">Verteilung</option>
    </select>

    <div class="rt-block" data-rt="constant">
        <label class="form-label mb-0 small">Schwellenwert (€)</label>
        <input type="number" step="any" name="rt_value" class="form-control form-control-sm">
    </div>

    <div class="rt-block" data-rt="curve">
        <table class="table table-sm align-middle mb-1">
            <thead><tr><th class="small">Verlust (€)</th><th class="small">Level (0–1)</th><th></th></tr></thead>
            <tbody id="rt-curve-body"></tbody>
        </table>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="rt-add-row">+ Zeile</button>
        <input type="hidden" name="rt_curve" id="rt-curve-json">
    </div>

    <div class="rt-block" data-rt="distribution">
        <label class="form-label mb-0 small">Verteilung</label>
        <select name="rt_dist" id="rt-dist" class="form-select form-select-sm mb-1">
            <option value="pert">PERT</option>
            <option value="lognormal">Lognormal</option>
            <option value="normal">Normal</option>
        </select>
        <div class="rt-dp" data-rtdist="pert">
            <div class="row g-1">
                <div class="col"><label class="form-label mb-0 small">min (€)</label><input type="number" step="any" name="rt_pert_low" class="form-control form-control-sm"></div>
                <div class="col"><label class="form-label mb-0 small">wahrsch. (€)</label><input type="number" step="any" name="rt_pert_mode" class="form-control form-control-sm"></div>
                <div class="col"><label class="form-label mb-0 small">max (€)</label><input type="number" step="any" name="rt_pert_high" class="form-control form-control-sm"></div>
            </div>
            <label class="form-label mb-0 small">gamma</label>
            <input type="number" step="any" name="rt_pert_gamma" value="4" class="form-control form-control-sm">
        </div>
        <div class="rt-dp" data-rtdist="lognormal">
            <label class="form-label mb-0 small">Mittelwert (€)</label>
            <input type="number" step="any" name="rt_ln_mean" class="form-control form-control-sm">
            <label class="form-label mb-0 small">sigma</label>
            <input type="number" step="any" name="rt_ln_sigma" value="0.5" class="form-control form-control-sm">
        </div>
        <div class="rt-dp" data-rtdist="normal">
            <label class="form-label mb-0 small">Mittelwert (€)</label>
            <input type="number" step="any" name="rt_no_mean" class="form-control form-control-sm">
            <label class="form-label mb-0 small">Streuung (€)</label>
            <input type="number" step="any" name="rt_no_stdev" class="form-control form-control-sm">
        </div>
        <label class="form-label mb-0 small">Samples</label>
        <input type="number" name="rt_samples" value="20000" class="form-control form-control-sm">
    </div>
</div></div>
