{% extends "base.html" %}

{% block title %}Szenario löschen &middot; fair-web{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Szenario löschen</h1>
<p>Soll das Szenario <strong>„{{ szenario.name }}"</strong> wirklich gelöscht werden? Die zugehörigen Faktoren werden mit entfernt.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Endgültig löschen</button>
    <a class="btn btn-link" href="{% url 'szenarien:detail' szenario.pk %}">Abbrechen</a>
</form>
{% endblock %}
