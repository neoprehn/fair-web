site_name: fair-web Dokumentation
site_description: FAIR-Risikomodellierung mit fair-web und pyfair (neoprehn-Fork)
docs_dir: docs

theme:
  name: material
  language: de
  palette:
    - scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Heller Modus
    - scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Dunkler Modus
  features:
    - navigation.expand
    - navigation.top
    - content.code.copy

nav:
  - Start: index.md
  - FAIR-Grundlagen:
      - FAIR-Taxonomie: fair-taxonomie.md
  - pyfair (Engine):
      - Installation: installation.md
      - Schnellstart: schnellstart.md
      - Modelle erstellen: modelle.md
      - Eingaben & Verteilungen: eingaben.md
      - Meta-Modelle (Vergleich & Summe): metamodelle.md
      - Berichte: berichte.md
      - Serialisierung & Datenbank: serialisierung.md
      - Fork-Erweiterungen: pyfair-fork.md
  - Web-App:
      - Bedienung (fair-web): bedienung.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
